{{define "bookmark-row"}}
<li id="bookmark-{{.ID}}" class="flex items-start gap-3 px-4 py-3 hover:bg-zinc-50 dark:hover:bg-zinc-800/50">
    <div class="w-8 h-8 rounded-lg bg-indigo-50 dark:bg-indigo-950 text-indigo-600 dark:text-indigo-400 grid place-items-center text-sm font-bold shrink-0">{{initial .Title}}</div>
    <div class="min-w-0 flex-1">
        <a href="{{.URL}}" target="_blank" rel="noopener noreferrer" class="text-sm font-semibold hover:text-indigo-600 dark:hover:text-indigo-400 truncate block">
            {{.Title}}
        </a>
        <p class="truncate text-xs text-zinc-400">{{.URL}}</p>
        {{if .Description}}
            <p class="mt-1 text-sm text-zinc-500 dark:text-zinc-400">{{.Description}}</p>
        {{end}}
        {{if .Tags}}
            <p class="mt-1 text-xs text-zinc-400">{{.Tags}}</p>
        {{end}}
    </div>
    <div class="flex shrink-0 gap-1">
        <button
            aria-label="Edit"
            class="w-7 h-7 rounded-md grid place-items-center text-zinc-500 hover:bg-indigo-50 hover:text-indigo-600 dark:hover:bg-indigo-950 dark:hover:text-indigo-400"
            hx-get="/bookmarks/{{.ID}}/edit"
            hx-target="#modal-root"
            hx-swap="innerHTML"
        >
            ✎
        </button>
        <button
            aria-label="Delete"
            class="w-7 h-7 rounded-md grid place-items-center text-zinc-500 hover:bg-red-50 hover:text-red-600 dark:hover:bg-red-950"
            hx-get="/bookmarks/{{.ID}}/confirm-delete"
            hx-target="#modal-root"
            hx-swap="innerHTML"
        >
            ✕
        </button>
    </div>
</li>
{{end}}
