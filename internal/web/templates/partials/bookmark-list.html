{{define "bookmark-list"}}
<ul id="bookmark-list" class="divide-y divide-slate-200 rounded-md border border-slate-200 bg-white">
    {{if not .Bookmarks}}
        <li class="px-4 py-6 text-center text-sm text-slate-500">No bookmarks yet.</li>
    {{end}}
    {{range .Bookmarks}}
        {{template "bookmark-row" .}}
    {{end}}
</ul>
{{end}}
