{{define "bookmark-form-modal"}}
<div id="bookmark-modal" class="fixed inset-0 z-50 flex items-end sm:items-center justify-center bg-zinc-900/45"
     onclick="if (event.target === this) this.remove()">
    <form
        class="w-full sm:max-w-lg bg-white dark:bg-zinc-900 rounded-t-2xl sm:rounded-xl shadow-2xl overflow-hidden"
        hx-{{.Method}}="{{.Action}}"
        hx-target="{{.Target}}"
        hx-swap="{{.Swap}}"
    >
        <div class="sm:hidden w-9 h-1 rounded-full bg-zinc-200 dark:bg-zinc-700 mx-auto mt-2"></div>

        <div class="flex items-center justify-between px-5 py-4 border-b border-zinc-100 dark:border-zinc-800">
            <h2 class="font-semibold text-[17px] sm:text-[15px]">{{if .Bookmark.ID}}Edit{{else}}Add{{end}} bookmark</h2>
            <button type="button" aria-label="Close" onclick="document.getElementById('bookmark-modal').remove()"
                    class="w-11 h-11 sm:w-8 sm:h-8 grid place-items-center text-zinc-400 hover:text-zinc-600">✕</button>
        </div>

        <div class="p-5 flex flex-col gap-4">
            {{if .Error}}
                <p class="rounded-md bg-red-50 dark:bg-red-950 px-3 py-2 text-sm text-red-700 dark:text-red-400">{{.Error}}</p>
            {{end}}
            <label class="flex flex-col gap-1.5">
                <span class="text-[13px] sm:text-xs font-semibold text-zinc-600 dark:text-zinc-400">Title</span>
                <input
                    id="title-{{.FieldSuffix}}"
                    name="title"
                    type="text"
                    required
                    value="{{.Bookmark.Title}}"
                    class="border border-zinc-200 dark:border-zinc-700 bg-white dark:bg-zinc-900 rounded-xl sm:rounded-lg px-3.5 py-3 sm:py-2 text-[15px] sm:text-sm outline-none focus:border-indigo-600 focus:ring-4 focus:ring-indigo-50 dark:focus:ring-indigo-950"
                >
            </label>
            <label class="flex flex-col gap-1.5">
                <span class="text-[13px] sm:text-xs font-semibold text-zinc-600 dark:text-zinc-400">URL</span>
                <input
                    id="url-{{.FieldSuffix}}"
                    name="url"
                    type="url"
                    autocomplete="off"
                    required
                    placeholder="https://example.com"
                    value="{{.Bookmark.URL}}"
                    class="border border-zinc-200 dark:border-zinc-700 bg-zinc-50 dark:bg-zinc-800 rounded-xl sm:rounded-lg px-3.5 py-3 sm:py-2 text-[15px] sm:text-sm outline-none focus:border-indigo-600 focus:ring-4 focus:ring-indigo-50 dark:focus:ring-indigo-950"
                >
            </label>
            <label class="flex flex-col gap-1.5">
                <span class="text-[13px] sm:text-xs font-semibold text-zinc-600 dark:text-zinc-400">Description <span class="font-normal text-zinc-400">· optional</span></span>
                <textarea
                    id="description-{{.FieldSuffix}}"
                    name="description"
                    rows="2"
                    class="border border-zinc-200 dark:border-zinc-700 bg-white dark:bg-zinc-900 rounded-xl sm:rounded-lg px-3.5 py-3 sm:py-2 text-[15px] sm:text-sm outline-none focus:border-indigo-600 focus:ring-4 focus:ring-indigo-50 dark:focus:ring-indigo-950 resize-none"
                >{{.Bookmark.Description}}</textarea>
            </label>
            <label class="flex flex-col gap-1.5">
                <span class="text-[13px] sm:text-xs font-semibold text-zinc-600 dark:text-zinc-400">Tags <span class="font-normal text-zinc-400">· comma separated</span></span>
                <input
                    id="tags-{{.FieldSuffix}}"
                    name="tags"
                    type="text"
                    autocomplete="off"
                    value="{{.Bookmark.Tags}}"
                    class="border border-zinc-200 dark:border-zinc-700 bg-white dark:bg-zinc-900 rounded-xl sm:rounded-lg px-3.5 py-3 sm:py-2 text-[15px] sm:text-sm outline-none focus:border-indigo-600 focus:ring-4 focus:ring-indigo-50 dark:focus:ring-indigo-950"
                >
            </label>
        </div>

        <div class="flex flex-col-reverse sm:flex-row sm:justify-end gap-2.5 px-5 py-4 border-t border-zinc-100 dark:border-zinc-800 bg-zinc-50 dark:bg-zinc-800/50">
            <button type="button" onclick="document.getElementById('bookmark-modal').remove()"
                    class="text-[15px] sm:text-sm font-medium text-zinc-600 dark:text-zinc-300 px-4 py-3 sm:py-2 rounded-xl sm:rounded-lg border border-zinc-200 dark:border-zinc-700 bg-white dark:bg-zinc-900">Cancel</button>
            <button type="submit"
                    class="text-[15px] sm:text-sm font-semibold text-white px-4 py-3 sm:py-2 rounded-xl sm:rounded-lg bg-indigo-600 hover:bg-indigo-700">{{if .Bookmark.ID}}Save changes{{else}}Save bookmark{{end}}</button>
        </div>
    </form>
</div>
{{end}}
