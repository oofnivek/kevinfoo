{{define "bookmark-form"}}
<form
    id="bookmark-form-{{if .Bookmark.ID}}{{.Bookmark.ID}}{{else}}new{{end}}"
    class="mb-6 space-y-3 rounded-md border border-slate-200 bg-white p-4"
    hx-{{.Method}}="{{.Action}}"
    hx-target="{{.Target}}"
    hx-swap="{{.Swap}}"
>
    {{if .Error}}
        <p class="rounded-md bg-red-50 px-3 py-2 text-sm text-red-700">{{.Error}}</p>
    {{end}}

    <div>
        <label class="block text-xs font-medium text-slate-600" for="title-{{.FieldSuffix}}">Title</label>
        <input
            id="title-{{.FieldSuffix}}"
            name="title"
            type="text"
            required
            value="{{.Bookmark.Title}}"
            class="mt-1 w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:border-slate-500 focus:outline-none"
        >
    </div>

    <div>
        <label class="block text-xs font-medium text-slate-600" for="url-{{.FieldSuffix}}">URL</label>
        <input
            id="url-{{.FieldSuffix}}"
            name="url"
            type="url"
            autocomplete="off"
            required
            placeholder="https://example.com"
            value="{{.Bookmark.URL}}"
            class="mt-1 w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:border-slate-500 focus:outline-none"
        >
    </div>

    <div>
        <label class="block text-xs font-medium text-slate-600" for="description-{{.FieldSuffix}}">Description</label>
        <textarea
            id="description-{{.FieldSuffix}}"
            name="description"
            rows="2"
            class="mt-1 w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:border-slate-500 focus:outline-none"
        >{{.Bookmark.Description}}</textarea>
    </div>

    <div>
        <label class="block text-xs font-medium text-slate-600" for="tags-{{.FieldSuffix}}">Tags (comma separated)</label>
        <input
            id="tags-{{.FieldSuffix}}"
            name="tags"
            type="text"
            autocomplete="off"
            value="{{.Bookmark.Tags}}"
            class="mt-1 w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:border-slate-500 focus:outline-none"
        >
    </div>

    <div class="flex gap-2 pt-1">
        <button type="submit" class="rounded-md bg-slate-900 px-3 py-2 text-sm font-medium text-white hover:bg-slate-700">
            Save
        </button>
        <button
            type="button"
            class="rounded-md px-3 py-2 text-sm font-medium text-slate-600 hover:bg-slate-100"
            hx-get="{{.CancelURL}}"
            hx-target="{{.Target}}"
            hx-swap="{{.Swap}}"
        >
            Cancel
        </button>
    </div>
</form>
{{end}}
