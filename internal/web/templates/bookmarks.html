{{define "bookmarks-page"}}
<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookmarks</title>
    <link rel="stylesheet" href="/static/css/output.css">
    <script src="https://unpkg.com/htmx.org@2.0.4" defer></script>
</head>
<body class="min-h-screen bg-slate-50 text-slate-900">
    <div class="mx-auto max-w-3xl px-4 py-10">
        <a href="/" class="mb-4 inline-block text-sm text-slate-500 hover:underline">&larr; Home</a>
        <header class="mb-8 flex items-center justify-between">
            <h1 class="text-2xl font-semibold tracking-tight">Bookmarks</h1>
            <button
                class="rounded-md bg-slate-900 px-3 py-2 text-sm font-medium text-white hover:bg-slate-700"
                hx-get="/bookmarks/new"
                hx-target="#bookmark-form-slot"
                hx-swap="innerHTML"
            >
                Add bookmark
            </button>
        </header>

        <div id="bookmark-form-slot"></div>

        <input
            type="search"
            name="q"
            autocomplete="off"
            placeholder="Search bookmarks..."
            class="mb-6 w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:border-slate-500 focus:outline-none"
            hx-get="/bookmarks/list"
            hx-trigger="keyup changed delay:300ms, search"
            hx-target="#bookmark-list"
            hx-swap="outerHTML"
        >

        {{template "bookmark-list" .}}
    </div>
</body>
</html>
{{end}}
