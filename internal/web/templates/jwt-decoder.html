{{define "jwt-decoder"}}
<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JWT Decoder</title>
    <link rel="stylesheet" href="/static/css/output.css">
</head>
<body class="min-h-screen bg-slate-50 text-slate-900">
    <div class="mx-auto max-w-3xl px-4 py-10">
        <a href="/" class="mb-4 inline-block text-sm text-slate-500 hover:underline">&larr; Home</a>

        <h1 class="text-2xl font-semibold tracking-tight">JWT Decoder</h1>
        <p class="mt-2 text-sm text-slate-600">
            Decode, edit, and re-sign a JWT entirely in your browser. Nothing is sent to a server.
            Only HMAC (HS256/HS384/HS512) signing is supported.
        </p>

        <textarea
            id="jwt-input"
            rows="4"
            placeholder="Paste a JWT here..."
            class="mt-6 w-full rounded-md border border-slate-300 px-3 py-2 font-mono text-xs focus:border-slate-500 focus:outline-none"
        ></textarea>

        <div class="mt-6 grid gap-4 sm:grid-cols-2">
            <div>
                <h2 class="mb-1 text-xs font-medium text-slate-600">Header</h2>
                <textarea
                    id="jwt-header"
                    rows="6"
                    class="w-full whitespace-pre rounded-md border border-slate-200 bg-white p-3 font-mono text-xs focus:border-slate-500 focus:outline-none"
                ></textarea>
            </div>
            <div>
                <h2 class="mb-1 text-xs font-medium text-slate-600">Payload</h2>
                <textarea
                    id="jwt-payload"
                    rows="6"
                    class="w-full whitespace-pre rounded-md border border-slate-200 bg-white p-3 font-mono text-xs focus:border-slate-500 focus:outline-none"
                ></textarea>
            </div>
        </div>

        <p id="jwt-error" class="mt-3 hidden rounded-md bg-red-50 px-3 py-2 text-sm text-red-700"></p>

        <div class="mt-6 rounded-md border border-slate-200 bg-white p-4">
            <h2 class="mb-3 text-sm font-medium text-slate-900">Sign</h2>
            <div class="flex flex-wrap items-end gap-3">
                <div>
                    <label class="block text-xs font-medium text-slate-600" for="jwt-alg">Algorithm</label>
                    <select id="jwt-alg" class="mt-1 rounded-md border border-slate-300 px-3 py-2 text-sm focus:border-slate-500 focus:outline-none">
                        <option value="HS256">HS256</option>
                        <option value="HS384">HS384</option>
                        <option value="HS512">HS512</option>
                    </select>
                </div>
                <div class="flex-1">
                    <label class="block text-xs font-medium text-slate-600" for="jwt-secret">Secret</label>
                    <input
                        id="jwt-secret"
                        type="text"
                        autocomplete="off"
                        placeholder="your-256-bit-secret"
                        class="mt-1 w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:border-slate-500 focus:outline-none"
                    >
                </div>
                <button
                    id="jwt-sign"
                    type="button"
                    class="rounded-md bg-slate-900 px-3 py-2 text-sm font-medium text-white hover:bg-slate-700"
                >
                    Sign
                </button>
            </div>

            <textarea
                id="jwt-output"
                rows="3"
                readonly
                placeholder="Signed token will appear here..."
                class="mt-4 w-full rounded-md border border-slate-300 bg-slate-50 px-3 py-2 font-mono text-xs focus:outline-none"
            ></textarea>
        </div>
    </div>

    <script>
        function base64UrlDecode(segment) {
            const padded = segment.replace(/-/g, "+").replace(/_/g, "/").padEnd(segment.length + (4 - (segment.length % 4 || 4)) % 4, "=");
            const binary = atob(padded);
            const bytes = Uint8Array.from(binary, (c) => c.charCodeAt(0));
            return new TextDecoder("utf-8").decode(bytes);
        }

        function base64UrlEncodeBytes(bytes) {
            let binary = "";
            bytes.forEach((b) => { binary += String.fromCharCode(b); });
            return btoa(binary).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
        }

        function base64UrlEncodeString(str) {
            return base64UrlEncodeBytes(new TextEncoder().encode(str));
        }

        function prettyJSON(segment) {
            return JSON.stringify(JSON.parse(base64UrlDecode(segment)), null, 2);
        }

        const input = document.getElementById("jwt-input");
        const headerEl = document.getElementById("jwt-header");
        const payloadEl = document.getElementById("jwt-payload");
        const errorEl = document.getElementById("jwt-error");
        const algEl = document.getElementById("jwt-alg");
        const secretEl = document.getElementById("jwt-secret");
        const outputEl = document.getElementById("jwt-output");
        const signBtn = document.getElementById("jwt-sign");

        function showError(message) {
            errorEl.textContent = message;
            errorEl.classList.remove("hidden");
        }

        function clearError() {
            errorEl.classList.add("hidden");
        }

        input.addEventListener("input", () => {
            const token = input.value.trim();
            clearError();
            outputEl.value = "";

            if (!token) {
                headerEl.value = "";
                payloadEl.value = "";
                return;
            }

            const parts = token.split(".");
            if (parts.length !== 3) {
                showError("Not a valid JWT: expected 3 dot-separated parts (header.payload.signature).");
                return;
            }

            try {
                headerEl.value = prettyJSON(parts[0]);
                payloadEl.value = prettyJSON(parts[1]);

                const header = JSON.parse(base64UrlDecode(parts[0]));
                if (header.alg && ["HS256", "HS384", "HS512"].includes(header.alg)) {
                    algEl.value = header.alg;
                }
            } catch (e) {
                showError("Could not decode: " + e.message);
            }
        });

        const hashByAlg = { HS256: "SHA-256", HS384: "SHA-384", HS512: "SHA-512" };

        signBtn.addEventListener("click", async () => {
            clearError();
            outputEl.value = "";

            const secret = secretEl.value;
            if (!secret) {
                showError("Enter a secret to sign with.");
                return;
            }

            let header, payload;
            try {
                header = JSON.parse(headerEl.value);
                payload = JSON.parse(payloadEl.value);
            } catch (e) {
                showError("Header and payload must be valid JSON: " + e.message);
                return;
            }

            const alg = algEl.value;
            header.alg = alg;
            headerEl.value = JSON.stringify(header, null, 2);

            const signingInput = base64UrlEncodeString(JSON.stringify(header)) + "." + base64UrlEncodeString(JSON.stringify(payload));

            try {
                const key = await crypto.subtle.importKey(
                    "raw",
                    new TextEncoder().encode(secret),
                    { name: "HMAC", hash: hashByAlg[alg] },
                    false,
                    ["sign"]
                );
                const signature = await crypto.subtle.sign("HMAC", key, new TextEncoder().encode(signingInput));
                const encodedSig = base64UrlEncodeBytes(new Uint8Array(signature));
                outputEl.value = signingInput + "." + encodedSig;
            } catch (e) {
                showError("Signing failed: " + e.message);
            }
        });
    </script>
</body>
</html>
{{end}}
