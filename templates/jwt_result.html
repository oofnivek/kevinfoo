<div class="box">
    <form hx-post="/jwt/mint" hx-target="#minted-token" hx-swap="innerHTML">
        <div class="field">
            <label class="label">Header (JSON)</label>
            <div class="control">
                <textarea class="textarea is-family-monospace" name="header" rows="4">{{header}}</textarea>
            </div>
        </div>

        <div class="field mt-4">
            <label class="label">Payload (JSON)</label>
            <div class="control">
                <textarea class="textarea is-family-monospace" name="payload" rows="8">{{payload}}</textarea>
            </div>
        </div>

        <div class="field mt-4">
            <label class="label">Signing Key (Secret)</label>
            <div class="control">
                <input class="input" type="text" name="secret" placeholder="Enter secret key to sign...">
            </div>
            <p class="help">Currently supports HS256 algorithm.</p>
        </div>

        <div class="field mt-5">
            <div class="control">
                <button type="submit" class="button is-info is-fullwidth">Mint & Sign JWT</button>
            </div>
        </div>
    </form>
</div>

<div id="minted-token" class="mt-4">
    <!-- New token will appear here -->
</div>

{{#if error}}
<div class="notification is-danger is-light mt-4">
    {{error}}
</div>
{{/if}}
