{{#each notes}}
<div class="box mb-3" id="note-{{_id}}">
    <div class="level is-mobile">
        <div class="level-left" style="overflow: hidden; text-overflow: ellipsis; flex-shrink: 1;">
            <div class="level-item" style="display: block; width: 100%;">
                <p class="content" style="white-space: pre-wrap; word-break: break-word;">{{content}}</p>
            </div>
        </div>
        <div class="level-right" style="flex-shrink: 0; margin-left: 1rem;">
            <div class="level-item">
                <div class="buttons">
                    <button class="button is-small is-info is-light" 
                            hx-get="/notes/{{_id}}/edit" 
                            hx-target="#note-{{_id}}" 
                            hx-swap="outerHTML">
                        Edit
                    </button>
                    <button class="button is-small is-danger is-light" 
                            hx-delete="/notes/{{_id}}" 
                            hx-target="#note-list"
                            hx-confirm="Are you sure you want to delete this note?">
                        Delete
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
{{else}}
<div class="has-text-centered py-6">
    <p class="has-text-grey">No notes found. Create one above to get started!</p>
</div>
{{/each}}
